# YAC configuration.
#
# On first launch, YAC writes this file to ~/.yac/settings.toml. This copy
# under the repo root is for reference — to reset your configuration, remove
# ~/.yac/settings.toml and start YAC again.
#
# Shell environment variables named YAC_* override anything set here at
# startup, which is convenient for CI and per-shell experiments.
#
# Secrets: prefer exporting your API key in your shell (OPENAI_API_KEY,
# ZAI_API_KEY) instead of placing it in [provider].api_key below. The env-var
# path is the default and keeps your key out of a plaintext file in $HOME.

temperature = 0.7
max_tool_rounds = 32                    # sequential tool rounds per response
# system_prompt = "You are a helpful assistant."
# workspace_root = "/path/to/workspace"   # defaults to the launch directory

[provider]
id          = "openai"                    # "openai" or "zai"
model       = "gpt-4o-mini"
base_url    = "https://api.openai.com/v1/"
api_key_env = "OPENAI_API_KEY"            # env var that holds the key
# api_key   = ""                          # optional; prefer the env var

# Z.ai preset example — uncomment to switch providers.
# Leaving model/base_url/api_key_env unset applies the built-in zai defaults
# (glm-5.1, https://api.z.ai/api/coding/paas/v4, ZAI_API_KEY).
# [provider]
# id = "zai"

[lsp.clangd]
command = "clangd"
args    = []

[theme]
# Active theme preset. Built-in: "vivid" (default), "system".
# The "system" theme uses terminal default colors and
# disables OSC 11 background sync.
name = "vivid"

# Theme density: "comfortable" (default, normal spacing) or "compact"
# (tighter layout).
# density = "comfortable"

# Paint the terminal background to match the active theme's canvas
# color (via OSC 11) and restore the terminal default on exit. Has
# no effect when name = "system".
sync_terminal_background = true

[mcp]
# Maximum bytes for MCP tool result payloads (default: 262144 = 256 KB).
# result_max_bytes = 262144

# MCP server examples (all commented; uncomment to enable).
#
# Stdio example: Context7 via npx (requires Node.js).
# [[mcp.servers]]
# id = "context7"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@upstash/context7-mcp"]
# enabled = true
# auto_start = true
#
# HTTP+OAuth example: Generic OAuth2 server.
# [[mcp.servers]]
# id = "example-oauth"
# transport = "http"
# url = "https://mcp.example.com/api"
# enabled = true
# auto_start = false
# requires_approval = false
# [mcp.servers.auth.oauth2]
# authorization_url = "https://auth.example.com/authorize"
# token_url = "https://auth.example.com/token"
# client_id = "your-client-id"
# scopes = ["read", "write"]
