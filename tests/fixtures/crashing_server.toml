[provider]
id          = "mock"
model       = "mock-model"
base_url    = "http://localhost/"
api_key_env = "MOCK_API_KEY"

[[mcp.servers]]
id        = "crashing_server"
transport = "stdio"
command   = "@FAKE_MCP_SERVER_PATH@"
args      = ["--advertise-tools=2", "--crash-after=initialize"]
enabled   = true
