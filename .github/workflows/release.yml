name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
          - platform: macos-arm64
            runner: macos-15

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ripgrep

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install ninja ripgrep

      # https://github.com/lukka/run-vcpkg#readme
      - name: Setup vcpkg (binary caching via GHA cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/external/vcpkg'
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build build-release

      - name: Test
        run: ctest --test-dir build-release --output-on-failure

      - name: Package
        id: package
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          safe_tag_name="${RELEASE_TAG//\//-}"
          package_name="yac-${safe_tag_name}-${PLATFORM}"
          package_root="dist/${package_name}"

          mkdir -p "${package_root}"
          cp build-release/yac "${package_root}/yac"
          chmod 755 "${package_root}/yac"
          cp README.md settings.example.toml "${package_root}/"

          tar -czf "dist/${package_name}.tar.gz" -C dist "${package_name}"
          echo "asset=dist/${package_name}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Upload release asset
        env:
          ASSET: ${{ steps.package.outputs.asset }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >
          gh release upload
          "${RELEASE_TAG}"
          "${ASSET}"
          --repo "${GITHUB_REPOSITORY}"
