name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux:
    name: Linux validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcurl4-openssl-dev clang-format clang-tidy

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Lint
        run: cmake --build build --target lint

      - name: Format check
        run: cmake --build build --target format-check
